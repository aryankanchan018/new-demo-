<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 Finance Tracker</h1>
            <p class="subtitle">Take control of your money</p>
        </header>

        <div class="dashboard">
            <div class="card balance-card">
                <h3>Total Balance</h3>
                <p class="balance-amount" id="totalBalance">₹0.00</p>
            </div>
            <div class="card income-card">
                <h3>Income</h3>
                <p class="income-amount" id="totalIncome">₹0.00</p>
            </div>
            <div class="card expense-card">
                <h3>Expenses</h3>
                <p class="expense-amount" id="totalExpense">₹0.00</p>
            </div>
        </div>

        <div class="main-content">
            <div class="left-section">
                <div class="card form-card">
                    <h2>Add Transaction</h2>
                    <form id="transactionForm">
                        <div class="form-group">
                            <label for="description">Description</label>
                            <input type="text" id="description" placeholder="e.g., Salary, Groceries" required>
                        </div>
                        <div class="form-group">
                            <label for="amount">Amount</label>
                            <input type="number" id="amount" placeholder="0.00" step="0.01" required>
                        </div>
                        <div class="form-group">
                            <label for="interestRate">Interest Rate (% per year)</label>
                            <input type="number" id="interestRate" placeholder="0" step="0.1" min="0">
                        </div>
                        <div class="form-group">
                            <label for="category">Category</label>
                            <select id="category" required>
                                <option value="">Select Category</option>
                                <option value="salary">💼 Salary</option>
                                <option value="freelance">💻 Freelance</option>
                                <option value="investment">📈 Investment</option>
                                <option value="lent">🤝 Money Lent</option>
                                <option value="food">🍔 Food</option>
                                <option value="transport">🚗 Transport</option>
                                <option value="entertainment">🎬 Entertainment</option>
                                <option value="shopping">🛍️ Shopping</option>
                                <option value="bills">📄 Bills</option>
                                <option value="other">📦 Other</option>
                            </select>
                        </div>
                        <div class="form-group radio-group">
                            <label>
                                <input type="radio" name="type" value="income" checked>
                                <span class="radio-label income-label">Income</span>
                            </label>
                            <label>
                                <input type="radio" name="type" value="expense">
                                <span class="radio-label expense-label">Expense</span>
                            </label>
                        </div>
                        <button type="submit" class="btn-primary">Add Transaction</button>
                    </form>
                </div>

                <div class="card chart-card">
                    <h2>Expense Breakdown</h2>
                    <canvas id="expenseChart"></canvas>
                    <div id="noDataMessage" class="no-data">No expenses yet</div>
                </div>
            </div>

            <div class="right-section">
                <div class="card transactions-card">
                    <div class="transactions-header">
                        <h2>Recent Transactions</h2>
                        <button id="clearAll" class="btn-clear">Clear All</button>
                    </div>
                    <div id="transactionsList" class="transactions-list">
                        <p class="no-transactions">No transactions yet. Add your first one!</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
